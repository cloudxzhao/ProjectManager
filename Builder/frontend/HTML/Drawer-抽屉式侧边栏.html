<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        /* --- 侧边抽屉容器 --- */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none; /* 默认隐藏 */
        }

        .side-drawer {
            position: fixed;
            top: 0;
            right: -650px; /* 初始在屏幕外 */
            width: 600px;
            height: 100vh;
            background: #161b22;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            color: #f0f6fc;
        }

        .side-drawer.open {
            right: 0;
        }

        /* 头部 */
        .drawer-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        /* --- 页签样式 --- */
        .tabs-nav {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 16px;
        }

        .tab-item {
            padding: 10px 20px;
            cursor: pointer;
            color: #8b949e;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .tab-item.active {
            color: #ff8c42;
            border-bottom-color: #ff8c42;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* 表单元素样式化 */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 13px; color: #8b949e; }
        .form-input, .form-textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 10px;
            color: white;
            box-sizing: border-box;
        }

        .form-textarea { height: 200px; resize: vertical; }

        .drawer-footer {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .btn-cancel { background: transparent; border: 1px solid #30363d; color: #c9d1d9; cursor: pointer; padding: 8px 16px; border-radius: 6px; }
        .btn-update { background: #ff8c42; border: none; color: white; cursor: pointer; padding: 8px 24px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <button onclick="openDrawer()" style="margin: 50px;">点击编辑“购物车”故事</button>

    <div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>

    <div class="side-drawer" id="drawer">
        <div class="drawer-header">
            <h3>编辑用户故事</h3>
            <span style="cursor:pointer" onclick="closeDrawer()">✕</span>
        </div>

        <div class="drawer-body">
            <div class="form-group">
                <label class="form-label">故事标题</label>
                <input type="text" class="form-input" value="购物车">
            </div>

            <div class="form-group">
                <label class="form-label">故事描述</label>
                <div class="tabs-nav">
                    <div class="tab-item active" onclick="switchTab(event, 'edit')">编写描述</div>
                    <div class="tab-item" onclick="switchTab(event, 'preview')">预览效果</div>
                </div>
                
                <div id="edit" class="tab-pane active">
                    <textarea class="form-textarea">作为一个注册用户，我想要将商品加入购物车，以便我可以统一管理我想购买的商品，并最终一起结算。</textarea>
                </div>
                
                <div id="preview" class="tab-pane">
                    <div style="padding: 15px; background: rgba(0,0,0,0.2); border-radius: 6px; min-height: 200px;">
                        <p><strong>用户故事示例</strong></p>
                        <p>作为一名注册用户...</p>
                        <p style="color: #8b949e;">(这里是 Markdown 渲染后的预览区域)</p>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">状态</label>
                    <select class="form-input"><option>待办</option></select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">优先级</label>
                    <select class="form-input"><option>中</option></select>
                </div>
            </div>
        </div>

        <div class="drawer-footer">
            <button class="btn-cancel" onclick="closeDrawer()">取消</button>
            <button class="btn-update">更新故事</button>
        </div>
    </div>

    <script>
        function openDrawer() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('drawer').classList.add('open');
        }

        function closeDrawer() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('drawer').classList.remove('open');
        }

        function switchTab(event, tabId) {
            // 切换按钮激活状态
            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // 切换内容显隐
            const panes = document.querySelectorAll('.tab-pane');
            panes.forEach(pane => pane.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
