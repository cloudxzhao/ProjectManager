# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:192.168.31.138}:${DB_PORT:5432}/${DB_NAME:projecthub_dev}
    username: ${DB_USER:pgsql}
    password: ${DB_PASSWORD:Admin_2026}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        default_schema: public

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:192.168.31.138}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:aiteam123}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 文件上传配置
springdoc:
  swagger-ui:
    enabled: true

# 本地开发允许的文件上传大小
spring.servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 10MB
