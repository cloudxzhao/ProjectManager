# ProjectHub 应用配置
server:
  port: 9527
  servlet:
    context-path: /

# Spring 配置
spring:
  application:
    name: projecthub
  profiles:
    active: dev

# 日志配置
logging:
  level:
    root: INFO
    com.projecthub: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level){highlight} %clr(%logger{36}){cyan} - %clr(%msg){faint}%n"

# JWT 配置
jwt:
  secret: ${JWT_SECRET:projecthub-secret-key-for-jwt-token-generation-must-be-long-enough}
  expiration: 7200000        # 2 小时
  refresh-expiration: 604800000  # 7 天
  header: Authorization
  prefix: Bearer

# API 文档配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# 应用配置
app:
  name: ProjectHub
  url: http://localhost:9527
  frontend-url: http://localhost:3000

# 邮件配置
spring.mail:
  host: ${MAIL_HOST:smtp.example.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:noreply@projecthub.com}
  password: ${MAIL_PASSWORD:changeme}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
