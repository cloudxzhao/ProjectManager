# ProjectHub 应用配置
server:
  port: 8080
  servlet:
    context-path: /

# Spring 配置
spring:
  application:
    name: projecthub
  profiles:
    active: dev

# 日志配置
logging:
  level:
    root: INFO
    com.projecthub: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置
jwt:
  secret: ${JWT_SECRET:projecthub-secret-key-for-jwt-token-generation-must-be-long-enough}
  expiration: 7200000        # 2 小时
  refresh-expiration: 604800000  # 7 天
  header: Authorization
  prefix: Bearer

# API 文档配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
