# 测试环境配置
spring:
  config:
    activate:
      on-profile: test

  # 数据源配置 - 使用 H2 内存数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  # H2 控制台
  h2:
    console:
      enabled: true

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Flyway 配置 - 测试环境禁用
  flyway:
    enabled: false

  # Redis 配置 - 测试环境使用嵌入模式
  data:
    redis:
      host: localhost
      port: 6379

# JWT 配置 - 测试环境
jwt:
  secret: test-secret-key-for-jwt-token-generation-must-be-long-enough
  expiration: 3600000
  refresh-expiration: 86400000

# 日志配置
logging:
  level:
    root: WARN
    com.projecthub: DEBUG
    org.springframework: WARN
    org.hibernate: WARN

# 禁用 Spring Security 用于测试
spring.security:
  filter:
    order: -100
