openapi: 3.0.3
info:
  title: ProjectHub API
  description: |
    ProjectHub 项目管理系统 API 接口文档

    ## 认证说明

    大部分接口需要使用 JWT Token 进行认证。在请求头中添加 `Authorization: Bearer {token}`。

    ## 错误码说明

    | 错误码 | 说明 |
    | ------ | ---- |
    | 200 | 成功 |
    | 400 | 请求参数错误 |
    | 401 | 未授权 |
    | 403 | 禁止访问 |
    | 404 | 资源不存在 |
    | 500 | 服务器内部错误 |

  version: 1.0.0
  contact:
    name: ProjectHub Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api/v1
    description: 开发环境
  - url: https://api.projecthub.com/api/v1
    description: 生产环境

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户信息相关接口
  - name: 项目
    description: 项目管理相关接口
  - name: 任务
    description: 任务管理相关接口
  - name: 用户故事
    description: 用户故事/史诗管理
  - name: 问题追踪
    description: Bug/Issue 管理
  - name: Wiki
    description: Wiki 文档管理
  - name: 报表
    description: 数据报表接口
  - name: 通知
    description: 消息通知接口

paths:
  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 使用邮箱和密码登录，返回 JWT Token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "user@example.com"
              password: "Password123"
              rememberMe: false
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_JwtResponse_'
              example:
                code: 200
                message: "success"
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  expiresIn: 7200
                  refreshExpiresIn: 604800
                timestamp: 1710144000000
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_void_'
              example:
                code: 400
                message: "邮箱格式不正确"
                timestamp: 1710144000000
        '401':
          description: 登录失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_void_'
              example:
                code: 2001
                message: "邮箱或密码错误"
                timestamp: 1710144000000

  /auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 注册新用户账号
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: "zhangsan"
              email: "zhangsan@example.com"
              password: "Password123"
              confirmPassword: "Password123"
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_UserVO_'
              example:
                code: 200
                message: "注册成功"
                data:
                  id: 1
                  username: "zhangsan"
                  email: "zhangsan@example.com"
                  avatar: null
                  createdAt: "2026-03-11T10:00:00"
                timestamp: 1710144000000
        '400':
          description: 参数错误
        '409':
          description: 用户已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_void_'
              example:
                code: 3002
                message: "用户已存在"
                timestamp: 1710144000000

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      description: 使当前 Token 失效
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_void_'
              example:
                code: 200
                message: "登出成功"
                timestamp: 1710144000000

  /auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新 Token
      description: 使用 Refresh Token 获取新的 Access Token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            example:
              refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_JwtResponse_'
        '401':
          description: Refresh Token 无效或已过期

  /auth/password/reset:
    post:
      tags:
        - 认证
      summary: 重置密码
      description: 发送密码重置邮件到指定邮箱
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required:
                - email
            example:
              email: "user@example.com"
      responses:
        '200':
          description: 邮件发送成功
        '404':
          description: 用户不存在

  /user/profile:
    get:
      tags:
        - 用户
      summary: 获取当前用户资料
      description: 获取登录用户的详细信息
      operationId: getUserProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_UserVO_'
              example:
                code: 200
                message: "success"
                data:
                  id: 1
                  username: "zhangsan"
                  email: "zhangsan@example.com"
                  avatar: "https://example.com/avatar.jpg"
                  roles: ["USER"]
                  createdAt: "2026-01-01T00:00:00"
                timestamp: 1710144000000

    put:
      tags:
        - 用户
      summary: 更新用户资料
      description: 更新当前用户的信息
      operationId: updateUserProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDTO'
            example:
              username: "zhangsan_new"
              avatar: "https://example.com/new-avatar.jpg"
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_UserVO_'

  /user/avatar:
    post:
      tags:
        - 用户
      summary: 上传头像
      description: 上传用户头像图片
      operationId: uploadAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_String_'
              example:
                code: 200
                message: "上传成功"
                data: "https://example.com/avatar/123.jpg"
                timestamp: 1710144000000

  /projects:
    get:
      tags:
        - 项目
      summary: 获取项目列表
      description: 获取当前用户参与的项目列表
      operationId: listProjects
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: 项目状态筛选
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: page
          in: query
          description: 页码 (从 1 开始)
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 20
        - name: keyword
          in: query
          description: 搜索关键词
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_PageResult_ProjectVO__'
              example:
                code: 200
                message: "success"
                data:
                  list:
                    - id: 1
                      name: "Project A"
                      description: "项目 A 描述"
                      status: "ACTIVE"
                      owner:
                        id: 1
                        username: "admin"
                      memberCount: 5
                      taskCount: 20
                      progress: 75
                      startDate: "2026-03-01"
                      endDate: "2026-06-30"
                      createdAt: "2026-03-01T10:00:00"
                  total: 10
                  page: 1
                  size: 20
                timestamp: 1710144000000

    post:
      tags:
        - 项目
      summary: 创建项目
      description: 创建新项目
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectDTO'
            example:
              name: "新项目"
              description: "这是一个新项目"
              startDate: "2026-03-11"
              endDate: "2026-12-31"
              ownerId: 1
              icon: "folder"
              themeColor: "#1890ff"
              memberIds: [2, 3, 4]
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_ProjectVO_'
              example:
                code: 200
                message: "创建成功"
                data:
                  id: 10
                  name: "新项目"
                  description: "这是一个新项目"
                  status: "ACTIVE"
                  ownerId: 1
                  createdAt: "2026-03-11T10:00:00"
                timestamp: 1710144000000
        '400':
          description: 参数错误
        '403':
          description: 无权限创建项目

  /projects/{id}:
    get:
      tags:
        - 项目
      summary: 获取项目详情
      description: 获取指定项目的详细信息
      operationId: getProject
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 项目 ID
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_ProjectDetailVO_'
              example:
                code: 200
                message: "success"
                data:
                  id: 1
                  name: "Project A"
                  description: "项目 A 描述"
                  status: "ACTIVE"
                  owner:
                    id: 1
                    username: "admin"
                    avatar: "https://example.com/avatar.jpg"
                  members:
                    - id: 2
                      username: "user1"
                      role: "MEMBER"
                    - id: 3
                      username: "user2"
                      role: "MEMBER"
                  taskStats:
                    total: 20
                    todo: 5
                    inProgress: 10
                    inReview: 3
                    done: 2
                  startDate: "2026-03-01"
                  endDate: "2026-06-30"
                  icon: "folder"
                  themeColor: "#1890ff"
                  createdAt: "2026-03-01T10:00:00"
                timestamp: 1710144000000
        '404':
          description: 项目不存在

    put:
      tags:
        - 项目
      summary: 更新项目
      description: 更新项目信息
      operationId: updateProject
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectDTO'
            example:
              name: "更新后的项目名"
              description: "更新后的描述"
              endDate: "2026-12-31"
              status: "ACTIVE"
              icon: "rocket"
              themeColor: "#52c41a"
      responses:
        '200':
          description: 更新成功
        '404':
          description: 项目不存在
        '403':
          description: 无权限修改项目

    delete:
      tags:
        - 项目
      summary: 删除项目
      description: 删除项目及其关联数据
      operationId: deleteProject
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_void_'
              example:
                code: 200
                message: "删除成功"
                timestamp: 1710144000000
        '404':
          description: 项目不存在
        '403':
          description: 无权限删除项目

  /projects/{id}/members:
    get:
      tags:
        - 项目
      summary: 获取项目成员列表
      operationId: getProjectMembers
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectMemberVO'
                  timestamp:
                    type: integer

    post:
      tags:
        - 项目
      summary: 添加项目成员
      operationId: addProjectMember
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                role:
                  type: string
                  enum: [MEMBER, MANAGER]
              required:
                - userId
                - role
            example:
              userId: 5
              role: "MEMBER"
      responses:
        '200':
          description: 添加成功
        '404':
          description: 项目不存在或用户不存在
        '409':
          description: 成员已存在

  /projects/{id}/members/{userId}:
    delete:
      tags:
        - 项目
      summary: 移除项目成员
      operationId: removeProjectMember
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 移除成功
        '404':
          description: 项目或成员不存在
        '403':
          description: 无权限移除成员

  /tasks:
    get:
      tags:
        - 任务
      summary: 获取任务列表
      description: 支持多种筛选条件
      operationId: listTasks
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          description: 项目 ID
          schema:
            type: integer
        - name: status
          in: query
          description: 任务状态
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: assigneeId
          in: query
          description: 负责人 ID
          schema:
            type: integer
        - name: priority
          in: query
          description: 优先级
          schema:
            $ref: '#/components/schemas/Priority'
        - name: keyword
          in: query
          description: 搜索关键词
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_PageResult_TaskVO__'

    post:
      tags:
        - 任务
      summary: 创建任务
      operationId: createTask
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskDTO'
            example:
              projectId: 1
              title: "新任务"
              description: "任务描述"
              status: "TODO"
              priority: "HIGH"
              assigneeId: 2
              dueDate: "2026-03-20"
              storyPoints: 3
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_TaskVO_'
        '400':
          description: 参数错误
        '403':
          description: 无权限创建任务

  /tasks/{id}:
    get:
      tags:
        - 任务
      summary: 获取任务详情
      operationId: getTask
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_TaskDetailVO_'
              example:
                code: 200
                message: "success"
                data:
                  id: 1
                  title: "任务标题"
                  description: "任务描述"
                  status: "IN_PROGRESS"
                  priority: "HIGH"
                  assignee:
                    id: 2
                    username: "user1"
                    avatar: "https://example.com/avatar.jpg"
                  creator:
                    id: 1
                    username: "admin"
                  project:
                    id: 1
                    name: "Project A"
                  dueDate: "2026-03-20"
                  storyPoints: 3
                  position: 1
                  subTasks:
                    - id: 1
                      title: "子任务 1"
                      completed: true
                    - id: 2
                      title: "子任务 2"
                      completed: false
                  comments:
                    - id: 1
                      user:
                        id: 2
                        username: "user1"
                      content: "评论内容"
                      createdAt: "2026-03-10T10:00:00"
                  createdAt: "2026-03-01T10:00:00"
                  updatedAt: "2026-03-10T15:00:00"
                timestamp: 1710144000000
        '404':
          description: 任务不存在

    put:
      tags:
        - 任务
      summary: 更新任务
      operationId: updateTask
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskDTO'
            example:
              title: "更新后的任务标题"
              description: "更新后的描述"
              status: "IN_REVIEW"
              priority: "URGENT"
              assigneeId: 3
              dueDate: "2026-03-25"
              storyPoints: 5
      responses:
        '200':
          description: 更新成功
        '404':
          description: 任务不存在
        '403':
          description: 无权限修改任务

    delete:
      tags:
        - 任务
      summary: 删除任务
      operationId: deleteTask
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
        '404':
          description: 任务不存在
        '403':
          description: 无权限删除任务

  /tasks/{id}/move:
    post:
      tags:
        - 任务
      summary: 移动任务状态
      description: 将任务移动到不同的状态列
      operationId: moveTask
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskDTO'
            example:
              status: "IN_PROGRESS"
              position: 2
      responses:
        '200':
          description: 移动成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_TaskVO_'

  /tasks/{id}/comments:
    get:
      tags:
        - 任务
      summary: 获取任务评论
      operationId: getTaskComments
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommentVO'
                  timestamp:
                    type: integer

    post:
      tags:
        - 任务
      summary: 添加任务评论
      operationId: addTaskComment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: 评论内容
                parentId:
                  type: integer
                  description: 父评论 ID (回复评论时使用)
              required:
                - content
            example:
              content: "这是一条评论"
              parentId: null
      responses:
        '200':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_CommentVO_'

  /projects/{projectId}/stories:
    get:
      tags:
        - 用户故事
      summary: 获取用户故事列表
      operationId: listStories
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: epicId
          in: query
          description: 史诗 ID 筛选
          schema:
            type: integer
        - name: status
          in: query
          description: 状态筛选
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_PageResult_StoryVO__'

    post:
      tags:
        - 用户故事
      summary: 创建用户故事
      operationId: createStory
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoryDTO'
            example:
              epicId: null
              title: "作为用户，我希望能够登录系统"
