components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 使用 JWT Token 进行认证，格式为 `Bearer {token}`

  schemas:
    # 通用响应包装
    Result_void_:
      type: object
      properties:
        code:
          type: integer
          description: 状态码
        message:
          type: string
          description: 消息
        timestamp:
          type: integer
          description: 时间戳
      required:
        - code
        - message
        - timestamp

    Result_String_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: string
        timestamp:
          type: integer
      required:
        - code
        - message
        - timestamp

    Result_Integer_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: integer
        timestamp:
          type: integer

    Result_UserVO_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserVO'
        timestamp:
          type: integer

    Result_JwtResponse_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/JwtResponse'
        timestamp:
          type: integer

    Result_ProjectVO_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/ProjectVO'
        timestamp:
          type: integer

    Result_ProjectDetailVO_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/ProjectDetailVO'
        timestamp:
          type: integer

    Result_PageResult_ProjectVO__:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/PageResult_ProjectVO_'
        timestamp:
          type: integer

    Result_TaskVO_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/TaskVO'
        timestamp:
          type: integer

    Result_TaskDetailVO_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/TaskDetailVO'
        timestamp:
          type: integer

    Result_PageResult_TaskVO__:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/PageResult_TaskVO_'
        timestamp:
          type: integer

    Result_StoryVO_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/StoryVO'
        timestamp:
          type: integer

    Result_PageResult_StoryVO__:
