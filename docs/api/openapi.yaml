          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/PageResult_NotificationVO_'
        timestamp:
          type: integer

    Result_CommentVO_:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/CommentVO'
        timestamp:
          type: integer

    # 认证相关 DTO
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: 邮箱
        password:
          type: string
          minLength: 8
          maxLength: 20
          description: 密码
        rememberMe:
          type: boolean
          default: false
          description: 是否记住我
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 20
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱
        password:
          type: string
          minLength: 8
          maxLength: 20
          description: 密码
        confirmPassword:
          type: string
          description: 确认密码
      required:
        - username
        - email
        - password
        - confirmPassword

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: 刷新 Token
      required:
        - refreshToken

    JwtResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: 访问 Token
        refreshToken:
          type: string
          description: 刷新 Token
        expiresIn:
          type: integer
          description: Access Token 过期时间 (秒)
        refreshExpiresIn:
          type: integer
          description: Refresh Token 过期时间 (秒)
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - refreshExpiresIn

    # 用户相关 VO
    UserVO:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        avatar:
          type: string
        roles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/UserStatus'

    UpdateUserDTO:
      type: object
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 20
        avatar:
          type: string

    # 项目相关 DTO/VO
    CreateProjectDTO:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: 项目名称
        description:
          type: string
          maxLength: 500
          description: 项目描述
        startDate:
          type: string
          format: date
          description: 开始日期
        endDate:
          type: string
          format: date
          description: 结束日期
        ownerId:
          type: integer
          description: 项目负责人 ID
        icon:
          type: string
          description: 项目图标
        themeColor:
          type: string
          description: 主题颜色
        memberIds:
          type: array
          items:
            type: integer
          description: 成员 ID 列表
      required:
        - name
        - startDate
        - endDate
        - ownerId

    UpdateProjectDTO:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        endDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/ProjectStatus'
        icon:
          type: string
        themeColor:
          type: string

    ProjectVO:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        owner:
          $ref: '#/components/schemas/UserVO'
        memberCount:
          type: integer
        taskCount:
          type: integer
        progress:
          type: integer
          description: 进度百分比
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        icon:
          type: string
        themeColor:
          type: string
        createdAt:
          type: string
          format: date-time

    ProjectDetailVO:
      allOf:
        - $ref: '#/components/schemas/ProjectVO'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/ProjectMemberVO'
            taskStats:
              $ref: '#/components/schemas/TaskStats'

    ProjectMemberVO:
      type: object
      properties:
        id:
          type: integer
        user:
          $ref: '#/components/schemas/UserVO'
        role:
          type: string
          enum: [OWNER, MANAGER, MEMBER]
        joinedAt:
          type: string
          format: date-time

    TaskStats:
      type: object
      properties:
        total:
          type: integer
        todo:
          type: integer
        inProgress:
          type: integer
        inReview:
          type: integer
        done:
          type: integer

    PageResult_ProjectVO_:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/ProjectVO'
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer

    # 任务相关 DTO/VO
    CreateTaskDTO:
      type: object
      properties:
        projectId:
          type: integer
          description: 项目 ID
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: 任务标题
        description:
          type: string
          description: 任务描述
        status:
          $ref: '#/components/schemas/TaskStatus'
          default: TODO
        priority:
          $ref: '#/components/schemas/Priority'
          default: MEDIUM
        assigneeId:
          type: integer
          description: 负责人 ID
        dueDate:
          type: string
          format: date
          description: 截止日期
        storyPoints:
          type: integer
          minimum: 0
          description: 故事点
        parentId:
          type: integer
          description: 父任务 ID (子任务时使用)
      required:
        - projectId
        - title

    UpdateTaskDTO:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/Priority'
        assigneeId:
          type: integer
        dueDate:
          type: string
          format: date
        storyPoints:
          type: integer
          minimum: 0

    MoveTaskDTO:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/TaskStatus'
        position:
          type: integer
          minimum: 0
          description: 在新状态列中的位置
